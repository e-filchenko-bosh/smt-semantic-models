name: Merge All Branches from Upstream

on:
  schedule:
    - cron: '0 12 * * *' # Every day at 12:00 UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your fork
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0 # All branches

      - name: Set up git
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git config --global credential.helper store
          echo "https://${GITHUB_ACTOR}:${GITHUB_TOKEN}@github.com" > ~/.git-credentials

      - name: Add upstream remote and fetch all branches
        run: |
          git remote add upstream https://github.com/bci-oss/smt-semantic-models.git
          git fetch upstream

      - name: Merge all branches from upstream
        run: |
          for branch in $(git branch -r | grep 'upstream/' | grep -v 'HEAD' | sed 's/upstream\///'); do
            git checkout $branch || git checkout -b $branch origin/$branch || git checkout -b $branch
            git merge --no-edit upstream/$branch || true
            git push origin $branch
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
